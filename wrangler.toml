# Cloudflare Worker behind https://status.prismonic.com
# Edit src/worker.js, push to main, GitHub Actions deploys via wrangler.

name = "prismonic-status"
main = "src/worker.js"
compatibility_date = "2025-05-01"
workers_dev = false

# Shared state across cron ticks: history samples + last-known UP/DOWN map.
# Namespace was created via the API on 2026-06-14; ID is stable.
[[kv_namespaces]]
binding = "STATUS_KV"
id = "604bc9944f48428486826c4fbb80e721"

# MVP cadence — every 5 minutes. Bump to "* * * * *" when traffic + KV
# write budget can absorb 1 sample/min (1,440/day vs free-tier 1k/day cap).
[triggers]
crons = ["*/5 * * * *"]

# The custom domain `status.prismonic.com` was bound once via Cloudflare's
# Workers Domains API and survives every deploy — wrangler doesn't need
# to (and shouldn't) try to re-manage it. `workers_dev = false` above
# keeps the workers.dev subdomain disabled so traffic only flows in via
# the bound custom domain.

# Secrets (NOT committed):
#   ALERT_ENDPOINT  — https://api.v3.prismonic.com/api/v1/internal/status-alert
#   ALERT_SECRET    — shared with the V3 backend's STATUS_ALERT_SECRET env
# Set once via Cloudflare dashboard OR `wrangler secret put <NAME>`.
# Once set they survive subsequent `wrangler deploy` calls.
