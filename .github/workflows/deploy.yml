name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci || npm install

      # `wrangler-action` reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
      # from secrets, runs `wrangler deploy`, and updates the live Worker.
      # Bindings declared in wrangler.toml (STATUS_KV, cron, custom domain)
      # are applied automatically; secrets (ALERT_ENDPOINT, ALERT_SECRET)
      # are NOT touched — set those once via the dashboard or
      # `wrangler secret put`.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
